name: docker

# Only do the release on x.y.z tags.
on:
  push:
    branches:
      - main
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  docker:
    name: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CROSS_VERSION: v0.2.5
    steps:
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@259a565a6f30a57c28f9ea913f2d359b43ff5fc9
        with:
          image: tonistiigi/binfmt:latest
          platforms: all

      - uses: EarthBuild/actions-setup@e11e36ffea530484da8a4e5a4bd17d69de480786 #v2.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: 0.8.17
          use-cache: "false"

      - name: Login to ghcr.io
        uses: docker/login-action@0267638d8ae53966df71bb06d552129dd542dfa7
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the images
        env:
          TAG: ${{ github.ref_name }}
        run: earth --push --no-output +docker-multiplatform --tag="${TAG}"

      - name: Check the uploaded images
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -ex
          for platform in linux/amd64 linux/arm64 linux/386 linux/arm/v7 linux/arm/v6 linux/ppc64le linux/s390x; do
            docker run --rm --platform ${platform} ghcr.io/glehmann/yage:"${TAG}" --version
          done

      - name: Tag the release as latest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/download/v0.19.0/go-containerregistry_Linux_x86_64.tar.gz | tar -zxvf - -C /usr/local/bin/ crane
          crane tag ghcr.io/glehmann/yage:"${TAG}" latest
